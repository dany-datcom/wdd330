<!doctype html>

<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sleep Outside | Checkout</title>

  <!-- ✅ CSS CORREGIDO -->
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <header class="divider" id="main-header"></header>

  <main class="divider">
    <section class="products">
      <h2>Review & Place your Order</h2>

      <!-- FORM -->
      <form id='checkoutForm' class='checkout-form'>
        <fieldset>
          <legend>Customer Info</legend>

          <input name='firstName' placeholder='First Name' required />
          <input name='lastName' placeholder='Last Name' required />

          <input name='street' placeholder='Street Address' required />
          <input name='city' placeholder='City' required />
          <input name='state' placeholder='State' required />

          <input name='zip' placeholder='Zip Code' required pattern='\d{5}' title='Enter a 5-digit ZIP code' />
        </fieldset>

        <fieldset>
          <legend>Payment</legend>

          <input name='cardNumber' placeholder='Card Number' required pattern='\d{16}'
            title='Enter a 16-digit card number' />

          <input name='expiration' placeholder='MM/YY' required pattern='^(0[1-9]|1[0-2])\/\d{2}$'
            title='Format: MM/YY' />

          <input name='code' placeholder='CVV' required pattern='\d{3}' title='Enter 3-digit CVV' />
        </fieldset>

        <button id='checkoutSubmit' type='submit'>Checkout</button>
      </form>

      <!-- ORDER SUMMARY -->
      <div id="order-summary" class="order-summary">
        <h3>Order Summary</h3>
        <p>Subtotal: <span id="subtotal">$0.00</span></p>
        <p>Tax: <span id="tax">$0.00</span></p>
        <p>Shipping: <span id="shipping">$0.00</span></p>
        <p><strong>Total: <span id="total">$0.00</span></strong></p>
      </div>
    </section>
  </main>

  <footer id="main-footer"></footer>

  <!-- ✅ ESTO ES LO MÁS IMPORTANTE -->
  <script type="module" src="../js/main.js"></script>
</body>

</html>
